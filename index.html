<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Shop - Fotbalové dresy</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header / Navigation -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <h1 class="logo">⚽ Football Shop</h1>
                <div class="header-actions">
                    <div class="search-container">
                        <input type="text" id="searchInput" class="search-box" placeholder="Hledat dresy...">
                        <div id="searchDropdown" class="search-dropdown hidden"></div>
                    </div>
                    <button id="cartButton" class="cart-button">
                        🛒 Košík <span id="cartCount" class="cart-count">0</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Filter Section -->
    <section class="filters-section">
        <div class="container">
            <div class="filters">
                <div class="filter-group">
                    <label for="teamFilter">Tým:</label>
                    <select id="teamFilter">
                        <option value="">Všechny týmy</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="sizeFilter">Velikost:</label>
                    <select id="sizeFilter">
                        <option value="">Všechny velikosti</option>
                        <option value="XS">XS</option>
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                        <option value="XXL">XXL</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="priceFilter">Cena (do):</label>
                    <input type="number" id="priceFilter" placeholder="Max cena" min="0">
                </div>
                <button id="resetFilters" class="reset-btn">Resetovat filtry</button>
            </div>
        </div>
    </section>

    <!-- Products Section -->
    <main class="products-section">
        <div class="container">
            <h2>Naše produkty</h2>
            <div id="productsGrid" class="products-grid">
                <!-- Products will be loaded here -->
            </div>
        </div>
    </main>

    <!-- Shopping Cart Modal -->
    <div id="cartModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Nákupní košík</h2>
                <button id="closeCart" class="close-btn">&times;</button>
            </div>
            <div id="cartItems" class="cart-items">
                <!-- Cart items will be loaded here -->
            </div>
            <div class="cart-summary">
                <div class="summary-row">
                    <span>Celkem:</span>
                    <span id="cartTotal">0 Kč</span>
                </div>
                <button id="checkoutBtn" class="checkout-btn">Objednat</button>
            </div>
        </div>
    </div>

    <!-- Product Detail Modal -->
    <div id="productModal" class="modal hidden">
        <div class="modal-content product-modal">
            <div class="modal-header">
                <h2 id="productTitle"></h2>
                <button id="closeProduct" class="close-btn">&times;</button>
            </div>

            <!-- Image Gallery -->
            <div class="product-detail-container">
                <div class="gallery-section">
                    <div class="main-gallery">
                        <img id="mainImage" src="" alt="Product">
                        <button id="prevImage" class="gallery-nav prev">❮</button>
                        <button id="nextImage" class="gallery-nav next">❯</button>
                    </div>
                    <div class="gallery-controls">
                        <div class="image-counter">
                            <span id="imageCounter">1 / 4</span>
                        </div>
                        <button id="zoomImage" class="zoom-btn">🔍 Zvětšit</button>
                    </div>
                </div>

                <div class="details-section">
                    <div class="product-detail-header">
                        <span class="product-team" id="productTeam"></span>
                        <span class="product-price" id="productPrice"></span>
                    </div>

                    <p id="productDescription" class="product-description"></p>

                    <div class="product-specs">
                        <h3>Specifikace</h3>
                        <ul id="specsList"></ul>
                    </div>

                    <div class="size-selection">
                        <label>Vyberte velikost:</label>
                        <div id="sizeOptions" class="size-options"></div>
                    </div>

                    <button id="addToCartDetail" class="add-to-cart-btn" style="margin-top: 20px; width: 100%;">
                        Přidat do košíku
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Image Zoom Modal -->
    <div id="zoomModal" class="modal hidden zoom-fullscreen">
        <div class="zoom-container">
            <button id="closeZoom" class="close-btn zoom-close">&times;</button>
            <img id="zoomImage" src="" alt="Zvětšené">
            <button id="zoomPrev" class="zoom-nav prev">❮</button>
            <button id="zoomNext" class="zoom-nav next">❯</button>
        </div>
    </div>

    <!-- Success Message -->
    <div id="successMessage" class="success-message hidden">
        ✓ Objednávka odeslána! Děkujeme za nákup.
    </div>

    <script src="js/products.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
